<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lipid Profile - Vertical Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: "Segoe UI", sans-serif; padding: 10px; background: #f0f2f5; margin: 0; }
        .header { text-align: center; padding: 20px; background: white; margin-bottom: 20px; border-bottom: 1px solid #ddd; }
        
        /* Forces everything into a single column */
        .dashboard-stack { 
            display: flex;
            flex-direction: column;
            gap: 30px; 
            max-width: 1000px;
            margin: auto;
            padding-bottom: 50px;
        }
        
        .card { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
            height: 450px; /* Increased height for better clarity */
        }
        
        h2 { margin: 0; color: #333; }
        #status { font-size: 0.85em; color: #007bff; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Lipid Profile Analysis</h2>
        <div id="status">🔄 Loading Data...</div>
    </div>

    <div class="dashboard-stack">
        <div class="card"><canvas id="chartCHOL"></canvas></div>
        <div class="card"><canvas id="chartLDL"></canvas></div>
        <div class="card"><canvas id="chartTRIG"></canvas></div>
        <div class="card"><canvas id="chartHDL"></canvas></div>
    </div>

    <script>
        Chart.register(ChartDataLabels);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjzaygr0UXnmx1Bf54g1a242qb11IPXTRSyeP3ZmLLCNOkl6yAXQ4WYw3nhbKR9l2el98at4uKdTsH/pub?gid=926531515&single=true&output=csv';

        async function init() {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').filter(r => r.trim() !== "").map(row => row.split(','));
                
                const data = rows.slice(1).map(cols => ({
                    date: cols[0] ? cols[0].trim() : "",
                    chol: parseFloat(cols[1]),
                    ldl: parseFloat(cols[2]),
                    trig: parseFloat(cols[3]),
                    hdl: parseFloat(cols[4]),
                    meds: cols[5] ? cols[5].trim() : "N/A"
                })).filter(item => item.date !== "" && !isNaN(item.chol));

                renderChart("chartCHOL", "CHOL", data, "chol", "#e67e22", 200, "< 200");
                renderChart("chartLDL", "LDL-D", data, "ldl", "#c0392b", 100, "< 100");
                renderChart("chartTRIG", "TRIG", data, "trig", "#7e5109", 150, "< 150");
                renderChart("chartHDL", "HDL", data, "hdl", "#27ae60", 40, "> 40");

                statusEl.innerText = "✅ Dashboard Live (Sync: " + new Date().toLocaleTimeString() + ")";
                statusEl.style.color = "#28a745";
            } catch (err) { statusEl.innerText = "❌ Sync Error."; }
        }

        function renderChart(canvasId, title, data, key, color, targetVal, targetLabel) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            const annotations = {
                targetLine: {
                    type: 'line', yMin: targetVal, yMax: targetVal,
                    borderColor: color, borderDash: [6, 6], borderWidth: 2,
                    label: {
                        display: true, content: 'Target ' + targetLabel, position: 'end',
                        backgroundColor: 'white', color: color,
                        font: { size: 11, weight: 'bold' }, padding: 4
                    }
                }
            };

            let currentMed = data[0].meds;
            let startIdx = 0;
            const phaseColors = ['rgba(46, 204, 113, 0.1)', 'rgba(241, 196, 15, 0.1)', 'rgba(52, 152, 219, 0.1)', 'rgba(155, 89, 182, 0.1)'];
            let phaseCount = 0;

            for (let i = 0; i <= data.length; i++) {
                if (i === data.length || data[i].meds !== currentMed) {
                    annotations['phase' + i] = {
                        type: 'box', xMin: startIdx - 0.5, xMax: i - 1 + 0.5,
                        backgroundColor: phaseColors[phaseCount % phaseColors.length], borderWidth: 0,
                        label: {
                            content: currentMed.toUpperCase(),
                            display: true,
                            position: { x: 'center', y: 'start' },
                            yAdjust: 15, 
                            backgroundColor: 'rgba(255, 255, 255, 0.9)',
                            color: '#111', 
                            font: { size: 11, weight: 'bold' },
                            padding: 6,
                            borderRadius: 4,
                            borderWidth: 1,
                            borderColor: '#ccc'
                        }
                    };
                    if (i < data.length) { currentMed = data[i].meds; startIdx = i; phaseCount++; }
                }
            }

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: title, data: data.map(d => d[key]),
                        borderColor: color, backgroundColor: color, tension: 0.1, borderWidth: 3, pointRadius: 6
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        title: { display: true, text: title, font: { size: 20, weight: 'bold' }, color: '#333', padding: { bottom: 30 } },
                        legend: { display: false },
                        annotation: { annotations: annotations },
                        datalabels: { 
                            align: 'top', font: { weight: 'bold', size: 12 }, color: color,
                            formatter: (v) => Math.round(v), offset: 5
                        }
                    },
                    scales: { 
                        y: { beginAtZero: true, grace: '40%', title: { display: true, text: 'mg/dL' } },
                        x: { ticks: { font: { size: 11, weight: 'bold' } } }
                    }
                }
            });
        }
        window.onload = init;
    </script>
</body>
</html>
